<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
            padding: 16px;
            user-select: none;
            -webkit-user-select: none;
        }
        .tabs {
            display: flex; gap: 4px; margin-bottom: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px; padding: 4px; flex-wrap: wrap;
        }
        .tab {
            flex: 1; padding: 10px; text-align: center; border-radius: 10px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            color: var(--tg-theme-hint-color, #888);
            transition: all 0.2s; border: none; background: none; white-space: nowrap;
        }
        .tab.active { background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }

        .game { text-align: center; }
        .score-label { font-size: 13px; color: var(--tg-theme-hint-color, #888); text-transform: uppercase; letter-spacing: 1px; }
        .score { font-size: 48px; font-weight: 800; line-height: 1.1; }
        .combo {
            font-size: 14px; font-weight: 700; margin-bottom: 4px; min-height: 20px;
            transition: all 0.2s;
        }
        .multiplier { font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-bottom: 8px; }
        .shield-indicator {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-bottom: 4px;
            background: #2196f322; color: #2196f3;
        }
        .safe-indicator {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-bottom: 4px;
            background: #ff980022; color: #ff9800;
        }
        .prestige-badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 600; margin-bottom: 4px;
            background: #9c27b022; color: #9c27b0;
        }
        .cookie-wrap { position: relative; width: 200px; margin: 8px auto; }
        .cookie {
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f5d68a, #c8943c);
            cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 100px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15), inset 0 -4px 8px rgba(0,0,0,0.1), inset 0 4px 8px rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }
        .cookie:active { transform: scale(0.92); }
        .cookie-chips { position: absolute; width: 100%; height: 100%; border-radius: 50%; pointer-events: none; }
        .chip { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #6b4226; opacity: 0.6; }
        .chip:nth-child(1) { top: 25%; left: 30%; }
        .chip:nth-child(2) { top: 45%; left: 60%; }
        .chip:nth-child(3) { top: 65%; left: 35%; }
        .chip:nth-child(4) { top: 35%; left: 65%; }
        .chip:nth-child(5) { top: 55%; left: 25%; }
        .chip:nth-child(6) { top: 70%; left: 55%; }

        .golden-cookie {
            position: fixed; width: 80px; height: 80px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffe082, #ff8f00);
            cursor: pointer; z-index: 15; display: none;
            align-items: center; justify-content: center; font-size: 40px;
            box-shadow: 0 0 30px #ff8f0080;
            animation: goldenPulse 1s ease-in-out infinite alternate;
        }
        @keyframes goldenPulse {
            0% { transform: scale(1); box-shadow: 0 0 20px #ff8f0060; }
            100% { transform: scale(1.1); box-shadow: 0 0 40px #ff8f00b0; }
        }

        .plus-one {
            position: fixed; font-size: 32px; font-weight: 800;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 10;
        }
        .plus-one.gain { color: #4caf50; }
        .plus-one.loss { color: #f44336; }
        .plus-one.combo-text { color: #ff9800; font-size: 24px; }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }

        .event-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 24px; border-radius: 16px; text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2); z-index: 20;
            animation: popIn 0.3s ease-out; min-width: 220px;
        }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .event-popup .icon { font-size: 48px; margin-bottom: 8px; }
        .event-popup .text { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .event-popup .sub { font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-bottom: 16px; }
        .event-popup .btn {
            padding: 10px 28px; border: none; border-radius: 10px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 15px; font-weight: 600; cursor: pointer;
        }
        .event-popup .btn-golden {
            background: #ff8f00; color: #fff;
        }

        .status { margin-top: 4px; font-size: 12px; color: var(--tg-theme-hint-color, #aaa); }
        .prestige-btn {
            margin-top: 12px; padding: 10px 24px; border: none; border-radius: 10px;
            background: #9c27b0; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .prestige-btn:disabled { opacity: 0.4; cursor: default; }

        .shop-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; margin-bottom: 10px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
        }
        .shop-icon { font-size: 28px; }
        .shop-info { flex: 1; }
        .shop-name { font-weight: 600; font-size: 15px; }
        .shop-desc { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        .shop-btn {
            padding: 8px 18px; border: none; border-radius: 10px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 13px; font-weight: 600; cursor: pointer;
            white-space: nowrap;
        }
        .shop-btn:disabled { opacity: 0.4; cursor: default; }
        .shop-btn.bought { background: #4caf50; }
        .shop-btn.locked { background: #888; }

        .lb-entry {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; margin-bottom: 6px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 10px;
        }
        .lb-rank { font-weight: 800; font-size: 16px; width: 24px; color: var(--tg-theme-hint-color, #888); }
        .lb-rank.gold { color: #ffb300; }
        .lb-rank.silver { color: #9e9e9e; }
        .lb-rank.bronze { color: #cd7f32; }
        .lb-name { flex: 1; font-weight: 500; font-size: 14px; }
        .lb-score { font-weight: 700; font-size: 16px; }
        .lb-actions { display: flex; gap: 4px; }
        .lb-btn {
            padding: 6px 12px; border: none; border-radius: 8px;
            font-size: 11px; font-weight: 600; cursor: pointer; color: #fff;
        }
        .lb-attack { background: #f44336; }
        .lb-spy { background: #607d8b; }
        .lb-btn:disabled { opacity: 0.3; cursor: default; }
        .lb-empty { text-align: center; padding: 40px 0; color: var(--tg-theme-hint-color, #888); }

        .ach-entry {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; margin-bottom: 8px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
        }
        .ach-icon { font-size: 28px; width: 40px; text-align: center; }
        .ach-info { flex: 1; }
        .ach-name { font-weight: 600; font-size: 14px; }
        .ach-desc { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        .ach-status { font-size: 18px; }
        .ach-done { color: #4caf50; }
        .ach-locked { color: var(--tg-theme-hint-color, #ccc); }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" data-tab="game">🍪 Игра</button>
        <button class="tab" data-tab="shop">🏪 Магазин</button>
        <button class="tab" data-tab="leaderboard">🏆 Топ</button>
        <button class="tab" data-tab="achievements">🎯 Достиж</button>
    </div>

    <div class="page active" id="page-game">
        <div class="game">
            <p style="font-size:13px;color:var(--tg-theme-hint-color,#888);margin-bottom:2px" id="username">Загрузка...</p>
            <div class="score-label">Очки</div>
            <div class="score" id="score">0</div>
            <div class="combo" id="combo"></div>
            <div class="multiplier" id="multiplier">+1 за клик</div>
            <div id="prestige-badge" class="prestige-badge" style="display:none"></div>
            <div id="shield-indicator" class="shield-indicator" style="display:none">🛡️ Щит: <span id="shield-timer">5:00</span></div>
            <div id="safe-indicator" class="safe-indicator" style="display:none">🔒 Сейф: <span id="safe-pct">30%</span></div>
            <div id="boost-indicator" class="shield-indicator" style="display:none">⚡ x2: <span id="boost-timer">0:30</span></div>
            <div class="cookie-wrap">
                <div class="cookie" id="cookie">
                    <div class="cookie-chips">
                        <div class="chip"></div><div class="chip"></div><div class="chip"></div>
                        <div class="chip"></div><div class="chip"></div><div class="chip"></div>
                    </div>
                </div>
            </div>
            <button class="prestige-btn" id="prestige-btn" style="display:none">🔥 Престиж (нужно 10000 🍪)</button>
            <div class="status" id="status"></div>
        </div>
    </div>

    <div class="page" id="page-shop">
        <div id="shop-list"></div>
    </div>

    <div class="page" id="page-leaderboard">
        <div id="lb-msg" style="margin-bottom:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;display:none"></div>
        <div id="lb-list"></div>
    </div>

    <div class="page" id="page-achievements">
        <p style="font-size:13px;color:var(--tg-theme-hint-color,#888);margin-bottom:12px">Достижения обновляются автоматически</p>
        <div id="ach-list"></div>
    </div>

    <div id="golden-cookie" class="golden-cookie">🌟</div>
    <div id="event-popup" style="display:none"></div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const userId = tg?.initDataUnsafe?.user?.id?.toString() || 'guest';
        const userName = tg?.initDataUnsafe?.user?.first_name || 'Гость';
        let score = 0, clickBonus = 0, autoClicker = 0, shieldUntil = 0, safePct = 0;
        let activeUpgrades = {}, extra = {}, currentSkin = 'default', ownedSkins = ['default'];
        let saveTimer = null, autoTimer = null, shieldTimer = null, eventTimer = null;
        let recalcTimer = null, goldenTimer = null, comboResets = null;
        let combo = 0, lastClickTime = 0, clicksSinceSave = 0;
        let goldenEnabled = false;

        const SKINS = {
            default: { name: 'Классическая', cost: 0, gradient: 'radial-gradient(circle at 35% 35%, #f5d68a, #c8943c)', chips: '#6b4226' },
            choco:   { name: 'Шоколадная',   cost: 200, gradient: 'radial-gradient(circle at 35% 35%, #8d6e4a, #4a2c1a)', chips: '#2d1a0a' },
            matcha:  { name: 'Матча',        cost: 300, gradient: 'radial-gradient(circle at 35% 35%, #b8d9a0, #6b9b4e)', chips: '#3d5a2e' },
            golden:  { name: 'Золотая',      cost: 500, gradient: 'radial-gradient(circle at 35% 35%, #ffd700, #b8860b)', chips: '#6b4c00' },
            rainbow: { name: 'Радужная',     cost: 1000, gradient: 'radial-gradient(circle at 35% 35%, #ff9a9e, #a8e6cf)', chips: '#6b3b5a' },
            space:   { name: 'Космическая',  cost: 2000, gradient: 'radial-gradient(circle at 35% 35%, #5b2d8e, #1a0a3e)', chips: '#9c6bdb' },
        };

        const UPGRADE_DEFS = {
            click_bonus_1: { field: 'click_bonus', value: 1, duration: 300, requires: null },
            click_bonus_3: { field: 'click_bonus', value: 3, duration: 480, requires: 'click_bonus_1' },
            click_bonus_7: { field: 'click_bonus', value: 7, duration: 900, requires: 'click_bonus_3' },
            auto_clicker:  { field: 'auto_clicker', value: 1, duration: 300, requires: null },
            shield:        { field: 'shield', value: 300, duration: 300, requires: null },
            safe:          { field: 'safe', value: 30, duration: 300, requires: null },
            golden_boost:  { field: 'boost', value: 1, duration: 30, requires: null },
        };

        function recalcDerived() {
            const now = Math.floor(Date.now() / 1000);
            clickBonus = 0; autoClicker = 0; shieldUntil = 0; safePct = 0;
            let boostActive = false;
            for (const [key, expiry] of Object.entries(activeUpgrades)) {
                if (expiry <= now) { delete activeUpgrades[key]; continue; }
                const d = UPGRADE_DEFS[key];
                if (!d) continue;
                if (d.field === 'click_bonus') clickBonus += d.value;
                else if (d.field === 'auto_clicker') autoClicker = 1;
                else if (d.field === 'shield') shieldUntil = Math.max(shieldUntil, expiry);
                else if (d.field === 'safe') safePct = Math.max(safePct, d.value);
                else if (d.field === 'boost') boostActive = true;
            }
            clickBonus += (extra.prestige_bonus || 0);
            if (!autoClicker && autoTimer) { clearInterval(autoTimer); autoTimer = null; }
            const boostEl = document.getElementById('boost-indicator');
            if (boostActive) {
                const boostExpiry = activeUpgrades.golden_boost || 0;
                const rem = Math.max(0, boostExpiry - now);
                boostEl.style.display = 'inline-block';
                document.getElementById('boost-timer').textContent = Math.floor(rem / 60) + ':' + String(rem % 60).padStart(2, '0');
            } else {
                boostEl.style.display = 'none';
            }
        }

        function perClick() {
            const boost = activeUpgrades.golden_boost && activeUpgrades.golden_boost > Math.floor(Date.now() / 1000) ? 2 : 1;
            return (1 + clickBonus) * boost;
        }

        function showFloatingText(x, y, text, cls) {
            const el = document.createElement('div');
            el.className = 'plus-one ' + (cls || 'gain');
            el.textContent = text;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function showEventPopup(icon, text, sub, btnText, btnClass, onOk) {
            const popup = document.getElementById('event-popup');
            popup.innerHTML = `
                <div class="event-popup">
                    <div class="icon">${icon}</div>
                    <div class="text">${text}</div>
                    ${sub ? '<div class="sub">' + sub + '</div>' : ''}
                    <button class="btn ${btnClass || ''}" id="popup-ok">${btnText || 'Ок'}</button>
                </div>
            `;
            popup.style.display = 'block';
            document.getElementById('popup-ok').onclick = () => {
                popup.style.display = 'none';
                if (onOk) onOk();
            };
        }

        function closeEvent() {
            document.getElementById('event-popup').style.display = 'none';
        }

        function triggerRandomEvent() {
            const now = Math.floor(Date.now() / 1000);
            if (shieldUntil > now) {
                showEventPopup('🛡️', 'Щит сработал!', 'Злоумышленник не прошёл');
                return;
            }
            const EVENTS = [
                { icon: '🦝', text: 'Вор украл печенье!', sub: (n) => '-' + n + ' 🍪' },
                { icon: '💔', text: 'Печенье рассыпалось!', sub: (n) => '-' + n + ' 🍪' },
                { icon: '🐭', text: 'Мыши пробрались на склад!', sub: (n) => '-' + n + ' 🍪' },
            ];
            const event = EVENTS[Math.floor(Math.random() * EVENTS.length)];
            const loss = Math.max(1, Math.floor(score * (0.05 + Math.random() * 0.15)));
            const actualLoss = Math.min(score, loss);
            if (actualLoss <= 0) return;
            score -= actualLoss;
            renderUI(); scheduleSave();
            showEventPopup(event.icon, event.text, event.sub(actualLoss));
            showFloatingText(window.innerWidth / 2, window.innerHeight / 2, '-' + actualLoss, 'loss');
        }

        function scheduleRandomEvent() {
            if (eventTimer) clearTimeout(eventTimer);
            const delay = 20000 + Math.random() * 40000;
            eventTimer = setTimeout(() => {
                if (score > 50) triggerRandomEvent();
                scheduleRandomEvent();
            }, delay);
        }

        function scheduleGoldenCookie() {
            if (goldenTimer) clearTimeout(goldenTimer);
            if (!goldenEnabled) return;
            const delay = 30000 + Math.random() * 60000;
            goldenTimer = setTimeout(() => {
                showGoldenCookie();
                scheduleGoldenCookie();
            }, delay);
        }

        function showGoldenCookie() {
            const el = document.getElementById('golden-cookie');
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            el.style.left = (20 + Math.random() * (maxX - 20)) + 'px';
            el.style.top = (60 + Math.random() * (maxY - 60)) + 'px';
            el.style.display = 'flex';
            const timeout = setTimeout(() => { el.style.display = 'none'; }, 8000);
            el.onclick = () => {
                clearTimeout(timeout);
                el.style.display = 'none';
                claimGolden();
            };
        }

        async function claimGolden() {
            const rewards = [
                { type: 'cookies', value: 50, icon: '🍪', text: '+50 🍪' },
                { type: 'cookies', value: 100, icon: '🍪', text: '+100 🍪' },
                { type: 'cookies', value: 200, icon: '🍪', text: '+200 🍪' },
                { type: 'boost', value: 1, icon: '⚡', text: 'x2 клика на 30 сек' },
            ];
            const idx = Math.floor(Math.random() * rewards.length);
            const reward = rewards[idx];
            const res = await fetch('/api/golden', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                body: JSON.stringify({ reward: idx }),
            });
            const d = await res.json();
            if (d.ok) {
                score = d.score;
                activeUpgrades = d.active_upgrades || {};
                recalcDerived();
                renderUI(); scheduleSave();
                showEventPopup('🌟', 'Золотая печенька!', reward.text, 'Ура!', 'btn-golden');
            }
        }

        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('page-' + btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'leaderboard') loadLeaderboard();
                if (btn.dataset.tab === 'shop') renderShop();
                if (btn.dataset.tab === 'achievements') renderAchievements();
            });
        });

        function updateShieldDisplay() {
            const el = document.getElementById('shield-indicator');
            const timerEl = document.getElementById('shield-timer');
            const now = Math.floor(Date.now() / 1000);
            if (shieldUntil > now) {
                el.style.display = 'inline-block';
                const rem = shieldUntil - now;
                timerEl.textContent = Math.floor(rem / 60) + ':' + String(rem % 60).padStart(2, '0');
            } else {
                el.style.display = 'none';
                shieldUntil = 0;
            }
        }

        function renderUI() {
            document.getElementById('username').textContent = userName + (extra.prestige_bonus ? ' 🔥' : '');
            document.getElementById('score').textContent = score;
            const parts = ['+' + perClick() + ' за клик'];
            if (autoClicker) parts.push('⚡ автокликер');
            document.getElementById('multiplier').textContent = parts.join(' · ');
            updateShieldDisplay();

            const safeEl = document.getElementById('safe-indicator');
            if (safePct > 0) {
                safeEl.style.display = 'inline-block';
                document.getElementById('safe-pct').textContent = safePct + '%';
            } else {
                safeEl.style.display = 'none';
            }

            const pb = document.getElementById('prestige-badge');
            if (extra.prestige_bonus) {
                pb.style.display = 'inline-block';
                pb.textContent = '🔥 Престиж x' + extra.prestige_bonus;
            } else {
                pb.style.display = 'none';
            }

            applySkin();
            const pBtn = document.getElementById('prestige-btn');
            if (score >= 10000) {
                pBtn.style.display = 'inline-block';
                pBtn.disabled = false;
                pBtn.textContent = '🔥 Престиж (сброс до 0, +1 навсегда к клику)';
            } else if (extra.prestige_bonus > 0) {
                pBtn.style.display = 'inline-block';
                pBtn.disabled = true;
                pBtn.textContent = '🔥 Престиж: нужно 10000 🍪 (сейчас ' + score + ')';
            } else {
                pBtn.style.display = 'none';
            }

            renderCombo();
            renderShop();
        }

        function renderCombo() {
            const el = document.getElementById('combo');
            if (combo > 1) {
                el.textContent = '🔥 x' + combo + ' комбо!';
                el.style.color = '#ff9800';
            } else {
                el.textContent = '';
            }
        }

        document.getElementById('prestige-btn').addEventListener('click', async () => {
            const res = await fetch('/api/prestige', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
            });
            const d = await res.json();
            if (d.ok) {
                score = 0;
                activeUpgrades = {};
                extra.prestige_bonus = d.prestige_bonus;
                recalcDerived();
                renderUI(); scheduleSave();
                closeEvent();
                if (d.new_achievements && d.new_achievements.length > 0) {
                    showEventPopup('🏆', 'Новое достижение!', d.new_achievements.join(', '));
                } else {
                    showEventPopup('🔥', 'Престиж завершён!', 'Бонус к клику: +' + d.prestige_bonus);
                }
            } else {
                document.getElementById('status').textContent = d.error;
            }
        });

        function applySkin() {
            const skin = SKINS[currentSkin] || SKINS.default;
            const cookie = document.getElementById('cookie');
            cookie.style.background = skin.gradient;
            document.querySelectorAll('.chip').forEach(c => c.style.background = skin.chips);
        }

        function timeStr(expiry) {
            const rem = Math.max(0, expiry - Math.floor(Date.now() / 1000));
            const m = Math.floor(rem / 60), s = rem % 60;
            return m + ':' + String(s).padStart(2, '0');
        }

        function renderShop() {
            const allUpgrades = [
                { key: 'click_bonus_1', icon: '🖊️', name: 'Лучшая ручка',    desc: '+1 к клику · 5 мин',     cost: 50 },
                { key: 'click_bonus_3', icon: '🦾', name: 'Механическая рука', desc: '+3 к клику · 8 мин',     cost: 200, req: 'click_bonus_1' },
                { key: 'click_bonus_7', icon: '🤖', name: 'Робот-кликер',     desc: '+7 к клику · 15 мин',    cost: 800, req: 'click_bonus_3' },
                { key: 'auto_clicker',  icon: '⚡', name: 'Автокликер',       desc: '+1 🍪/2 сек · 5 мин',    cost: 300 },
                { key: 'shield',        icon: '🛡️', name: 'Щит',             desc: 'Защита от событий · 5 мин', cost: 200 },
                { key: 'safe',          icon: '🔒', name: 'Сейф',             desc: '30% печенек в сохранности при атаке · 5 мин', cost: 400 },
            ];
            const now = Math.floor(Date.now() / 1000);
            const el = document.getElementById('shop-list');
            el.innerHTML = allUpgrades.map(u => {
                const expiry = activeUpgrades[u.key];
                const isActive = expiry && expiry > now;
                const hasReq = !u.req || (activeUpgrades[u.req] && activeUpgrades[u.req] > now);
                const canBuy = score >= u.cost && !isActive && hasReq;
                const timeLeft = isActive ? timeStr(expiry) : '';
                let btnText = 'Купить';
                let btnClass = '';
                if (isActive) { btnText = '✓'; btnClass = 'bought'; }
                else if (!hasReq) { btnText = '🔒'; btnClass = 'locked'; }
                return `
                    <div class="shop-item">
                        <div class="shop-icon">${u.icon}</div>
                        <div class="shop-info">
                            <div class="shop-name">${u.name}</div>
                            <div class="shop-desc">${u.desc} · ${u.cost} 🍪${timeLeft ? ' · ⏱ ' + timeLeft : ''}</div>
                        </div>
                        <button class="shop-btn ${btnClass}" data-key="${u.key}" ${!canBuy && !isActive ? 'disabled' : ''}>
                            ${btnText}
                        </button>
                    </div>
                `;
            }).join('');

            const skinsHtml = renderSkinsHtml();
            el.innerHTML += skinsHtml;

            el.querySelectorAll('.shop-btn:not(.bought):not([disabled])').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const res = await fetch('/api/upgrade/buy', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                        body: JSON.stringify({ upgrade: btn.dataset.key }),
                    });
                    const data = await res.json();
                    if (data.ok) {
                        score = data.score;
                        activeUpgrades = data.active_upgrades || {};
                        recalcDerived();
                        if (autoClicker) startAutoClicker();
                        renderUI(); scheduleSave();
                    } else {
                        document.getElementById('status').textContent = data.error;
                    }
                });
            });

            el.querySelectorAll('[data-skin]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const res = await fetch('/api/skin/buy', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                        body: JSON.stringify({ skin: btn.dataset.skin }),
                    });
                    const d = await res.json();
                    if (d.ok) {
                        score = d.score;
                        currentSkin = d.current_skin;
                        ownedSkins = d.owned_skins;
                        renderUI(); scheduleSave();
                    } else {
                        document.getElementById('status').textContent = d.error;
                    }
                });
            });

            el.querySelectorAll('[data-select]').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentSkin = btn.dataset.select;
                    renderUI(); scheduleSave();
                });
            });
        }

        function renderSkinsHtml() {
            const skinKeys = Object.keys(SKINS);
            let html = '<div style="margin-top:16px;font-weight:700;font-size:14px">🎨 Скины</div>';
            skinKeys.forEach(key => {
                const s = SKINS[key];
                const owned = ownedSkins.includes(key);
                const active = currentSkin === key;
                const canBuy = score >= s.cost && !owned;
                html += `
                    <div class="shop-item" style="${active ? 'border:2px solid #4caf50' : ''}">
                        <div style="width:28px;height:28px;border-radius:50%;background:${s.gradient};flex-shrink:0"></div>
                        <div class="shop-info">
                            <div class="shop-name">${s.name} ${active ? '✓' : ''}</div>
                            <div class="shop-desc">${s.cost ? s.cost + ' 🍪' : 'Бесплатно'}${owned ? ' · в коллекции' : ''}</div>
                        </div>
                        ${!owned ? `<button class="shop-btn" data-skin="${key}" ${!canBuy ? 'disabled' : ''}>Купить</button>`
                                 : `<button class="shop-btn bought" data-select="${key}" ${active ? 'disabled' : ''}>Надеть</button>`}
                    </div>
                `;
            });
            return html;
        }

        function startAutoClicker() {
            if (autoTimer) clearInterval(autoTimer);
            autoTimer = setInterval(() => {
                if (!autoClicker) { clearInterval(autoTimer); autoTimer = null; return; }
                score++;
                renderUI(); scheduleSave();
            }, 2000);
        }

        function scheduleSave() {
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(saveToServer, 500);
        }

        async function saveToServer() {
            try {
                await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                    body: JSON.stringify({ user_name: userName, score, clicks_since_save: clicksSinceSave }),
                });
                clicksSinceSave = 0;
                document.getElementById('status').textContent = '✓ Сохранено';
            } catch { document.getElementById('status').textContent = '✗ Ошибка'; }
        }

        function showNotificationPopup(icon, text) {
            showEventPopup(icon, text);
        }

        async function loadUser() {
            try {
                const res = await fetch('/api/user', { headers: { 'x-telegram-user-id': userId } });
                const d = await res.json();
                score = d.score || 0;
                activeUpgrades = d.active_upgrades || {};
                extra = d.extra || {};
                currentSkin = extra.current_skin || 'default';
                ownedSkins = extra.owned_skins || ['default'];
                recalcDerived();
                if (autoClicker) startAutoClicker();
                renderUI();
                scheduleRandomEvent();
                setInterval(updateShieldDisplay, 1000);
                recalcTimer = setInterval(() => { recalcDerived(); renderUI(); }, 1000);

                goldenEnabled = true;
                scheduleGoldenCookie();

                if (d.new_achievements && d.new_achievements.length > 0) {
                    showEventPopup('🏆', 'Новое достижение!', 'Открой вкладку "Достиж"');
                }

                const notifs = d.notifications || [];
                if (notifs.length > 0) {
                    const n = notifs[0];
                    showNotificationPopup(n.icon, n.text);
                }

                checkDaily();
            } catch { renderUI(); scheduleRandomEvent(); }
        }

        async function checkDaily() {
            const res = await fetch('/api/daily', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
            });
            const d = await res.json();
            if (d.ok) {
                score = d.new_score;
                renderUI(); scheduleSave();
                showEventPopup('📅', 'Ежедневная награда!', '+' + d.bonus + ' 🍪');
            }
        }

        function showLbMsg(text, isError) {
            const el = document.getElementById('lb-msg');
            el.textContent = text;
            el.style.display = 'block';
            el.style.background = isError ? '#f4433622' : '#4caf5022';
            el.style.color = isError ? '#f44336' : '#4caf50';
            setTimeout(() => el.style.display = 'none', 6000);
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const d = await res.json();
                const list = document.getElementById('lb-list');
                if (!d.leaderboard || d.leaderboard.length === 0) {
                    list.innerHTML = '<div class="lb-empty">Пока нет участников</div>';
                    return;
                }
                list.innerHTML = d.leaderboard.map((e, i) => {
                    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                    const isSelf = e.user_id === userId;
                    return `
                        <div class="lb-entry">
                            <div class="lb-rank ${rankClass}">${i + 1}</div>
                            <div class="lb-name">${e.name} ${isSelf ? '(ты)' : ''}</div>
                            <div class="lb-score">${e.score}</div>
                            ${!isSelf ? `
                            <div class="lb-actions">
                                <button class="lb-btn lb-attack" data-target="${e.user_id}" data-name="${e.name}">💢</button>
                                <button class="lb-btn lb-spy" data-target="${e.user_id}" data-name="${e.name}">👁</button>
                            </div>` : ''}
                        </div>
                    `;
                }).join('');

                list.querySelectorAll('.lb-attack').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        btn.disabled = true; btn.textContent = '...';
                        const res = await fetch('/api/attack', {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                            body: JSON.stringify({ target_id: btn.dataset.target }),
                        });
                        const d = await res.json();
                        if (d.ok) {
                            score = d.new_score;
                            renderUI(); scheduleSave();
                            loadLeaderboard();
                            let msg = '💢 Атака на ' + btn.dataset.name + ' успешна!';
                            msg += ' Украдено ' + d.stolen + ' 🍪 (' + d.pct + '%)';
                            if (d.safe_protected > 0) msg += ', сейф спас ' + d.safe_protected + ' 🍪';
                            msg += ', разбилось ' + d.broken + ' 🍪 (' + d.break_pct + '%)';
                            msg += '. Получено: ' + d.gained + ' 🍪. Твой счёт: ' + d.new_score;
                            showLbMsg(msg, false);
                        } else {
                            showLbMsg(d.error, true);
                            btn.disabled = false; btn.textContent = '💢';
                        }
                    });
                });

                list.querySelectorAll('.lb-spy').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        btn.disabled = true; btn.textContent = '...';
                        const res = await fetch('/api/spy', {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                            body: JSON.stringify({ target_id: btn.dataset.target }),
                        });
                        const d = await res.json();
                        if (d.ok) {
                            score = d.new_score;
                            renderUI(); scheduleSave();
                            showLbMsg('👁 Разведка: у ' + d.target_name + ' ' + d.target_score + ' 🍪 (заплачено 100 🍪)', false);
                        } else {
                            showLbMsg(d.error, true);
                        }
                        btn.disabled = false; btn.textContent = '👁';
                    });
                });
            } catch {
                document.getElementById('lb-list').innerHTML = '<div class="lb-empty">Ошибка загрузки</div>';
            }
        }

        async function renderAchievements() {
            const res = await fetch('/api/achievements');
            const data = await res.json();
            const list = data.achievements || [];
            const earned = new Set(extra.achievements || []);
            const el = document.getElementById('ach-list');
            if (list.length === 0) {
                el.innerHTML = '<div class="lb-empty">Нет достижений</div>';
                return;
            }
            el.innerHTML = list.map(a => {
                const done = earned.has(a.id);
                return `
                    <div class="ach-entry">
                        <div class="ach-icon">${a.icon}</div>
                        <div class="ach-info">
                            <div class="ach-name">${a.name}</div>
                            <div class="ach-desc">${a.desc}</div>
                        </div>
                        <div class="ach-status ${done ? 'ach-done' : 'ach-locked'}">${done ? '✓' : '★'}</div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('cookie').addEventListener('click', (e) => {
            const now = Date.now();
            if (now - lastClickTime < 3000) {
                combo++;
            } else {
                combo = 1;
            }
            lastClickTime = now;
            if (comboResets) clearTimeout(comboResets);
            comboResets = setTimeout(() => { combo = 0; renderCombo(); }, 3000);

            const baseGain = perClick();
            const comboMultiplier = 1 + Math.min(combo, 5) * 0.1;
            const gain = Math.round(baseGain * comboMultiplier);
            const comboExtra = gain - baseGain;
            score += gain;
            clicksSinceSave++;
            renderUI(); scheduleSave();
            showFloatingText(e.clientX - 16, e.clientY - 16, '+' + gain, 'gain');
            if (comboExtra > 0) {
                showFloatingText(e.clientX + 20, e.clientY - 16, '+' + comboExtra + ' комбо', 'combo-text');
            }
        });

        loadUser();
    </script>
</body>
</html>
