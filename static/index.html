<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
            padding: 16px;
            user-select: none;
            -webkit-user-select: none;
        }
        .tabs {
            display: flex; gap: 4px; margin-bottom: 16px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px; padding: 4px;
        }
        .tab {
            flex: 1; padding: 10px; text-align: center; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            color: var(--tg-theme-hint-color, #888);
            transition: all 0.2s; border: none; background: none;
        }
        .tab.active { background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .page { display: none; }
        .page.active { display: block; }

        .game { text-align: center; }
        .score-label { font-size: 13px; color: var(--tg-theme-hint-color, #888); text-transform: uppercase; letter-spacing: 1px; }
        .score { font-size: 48px; font-weight: 800; line-height: 1.1; }
        .multiplier { font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-bottom: 12px; }
        .shield-indicator {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-bottom: 8px;
            background: #2196f322; color: #2196f3;
        }
        .cookie {
            width: 200px; height: 200px; margin: 12px auto;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f5d68a, #c8943c);
            cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 100px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15), inset 0 -4px 8px rgba(0,0,0,0.1), inset 0 4px 8px rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }
        .cookie:active { transform: scale(0.92); }
        .cookie-chips { position: absolute; width: 100%; height: 100%; border-radius: 50%; pointer-events: none; }
        .chip {
            position: absolute; width: 14px; height: 14px; border-radius: 50%;
            background: #6b4226; opacity: 0.6;
        }
        .chip:nth-child(1) { top: 25%; left: 30%; }
        .chip:nth-child(2) { top: 45%; left: 60%; }
        .chip:nth-child(3) { top: 65%; left: 35%; }
        .chip:nth-child(4) { top: 35%; left: 65%; }
        .chip:nth-child(5) { top: 55%; left: 25%; }
        .chip:nth-child(6) { top: 70%; left: 55%; }

        .plus-one {
            position: fixed; font-size: 32px; font-weight: 800;
            pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 10;
        }
        .plus-one.gain { color: #4caf50; }
        .plus-one.loss { color: #f44336; }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }

        .event-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 24px; border-radius: 16px; text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2); z-index: 20;
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .event-popup .icon { font-size: 48px; margin-bottom: 8px; }
        .event-popup .text { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .event-popup .sub { font-size: 13px; color: var(--tg-theme-hint-color, #888); margin-bottom: 16px; }
        .event-popup .btn {
            padding: 10px 28px; border: none; border-radius: 10px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 15px; font-weight: 600; cursor: pointer;
        }

        .status { margin-top: 4px; font-size: 12px; color: var(--tg-theme-hint-color, #aaa); }

        .shop-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; margin-bottom: 10px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
        }
        .shop-icon { font-size: 28px; }
        .shop-info { flex: 1; }
        .shop-name { font-weight: 600; font-size: 15px; }
        .shop-desc { font-size: 12px; color: var(--tg-theme-hint-color, #888); }
        .shop-btn {
            padding: 8px 18px; border: none; border-radius: 10px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 13px; font-weight: 600; cursor: pointer;
            white-space: nowrap;
        }
        .shop-btn:disabled { opacity: 0.4; cursor: default; }
        .shop-btn.bought { background: #4caf50; }

        .lb-entry {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; margin-bottom: 6px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 10px;
        }
        .lb-rank { font-weight: 800; font-size: 16px; width: 24px; color: var(--tg-theme-hint-color, #888); }
        .lb-rank.gold { color: #ffb300; }
        .lb-rank.silver { color: #9e9e9e; }
        .lb-rank.bronze { color: #cd7f32; }
        .lb-name { flex: 1; font-weight: 500; }
        .lb-score { font-weight: 700; font-size: 16px; }
        .lb-attack {
            padding: 6px 14px; border: none; border-radius: 8px;
            background: #f44336; color: #fff;
            font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .lb-attack:disabled { opacity: 0.3; cursor: default; }
        .lb-empty { text-align: center; padding: 40px 0; color: var(--tg-theme-hint-color, #888); }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab active" data-tab="game">🍪 Игра</button>
        <button class="tab" data-tab="shop">🏪 Магазин</button>
        <button class="tab" data-tab="leaderboard">🏆 Топ</button>
    </div>

    <div class="page active" id="page-game">
        <div class="game">
            <p style="font-size:13px;color:var(--tg-theme-hint-color,#888);margin-bottom:2px" id="username">Загрузка...</p>
            <div class="score-label">Очки</div>
            <div class="score" id="score">0</div>
            <div class="multiplier" id="multiplier">+1 за клик</div>
            <div id="shield-indicator" class="shield-indicator" style="display:none">🛡️ Щит: <span id="shield-timer">5:00</span></div>
            <div class="cookie" id="cookie">
                <div class="cookie-chips">
                    <div class="chip"></div><div class="chip"></div><div class="chip"></div>
                    <div class="chip"></div><div class="chip"></div><div class="chip"></div>
                </div>
            </div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <div class="page" id="page-shop">
        <div id="shop-list"></div>
    </div>

    <div class="page" id="page-leaderboard">
        <div id="lb-msg" style="margin-bottom:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;display:none"></div>
        <div id="lb-list"></div>
    </div>

    <div id="event-popup" style="display:none"></div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const userId = tg?.initDataUnsafe?.user?.id?.toString() || 'guest';
        const userName = tg?.initDataUnsafe?.user?.first_name || 'Гость';
        let score = 0, clickBonus = 0, autoClicker = 0, shieldUntil = 0;
        let activeUpgrades = {};
        let saveTimer = null, autoTimer = null, shieldTimer = null, eventTimer = null, recalcTimer = null;

        const UPGRADE_DEFS = {
            click_bonus_1: { field: 'click_bonus', value: 1, duration: 300 },
            click_bonus_3: { field: 'click_bonus', value: 3, duration: 300 },
            click_bonus_7: { field: 'click_bonus', value: 7, duration: 300 },
            auto_clicker: { field: 'auto_clicker', value: 1, duration: 300 },
            shield: { field: 'shield', value: 300, duration: 300 },
        };

        function recalcDerived() {
            const now = Math.floor(Date.now() / 1000);
            clickBonus = 0; autoClicker = 0; shieldUntil = 0;
            for (const [key, expiry] of Object.entries(activeUpgrades)) {
                if (expiry <= now) { delete activeUpgrades[key]; continue; }
                const d = UPGRADE_DEFS[key];
                if (!d) continue;
                if (d.field === 'click_bonus') clickBonus += d.value;
                else if (d.field === 'auto_clicker') autoClicker = 1;
                else if (d.field === 'shield') shieldUntil = Math.max(shieldUntil, expiry);
            }
            if (!autoClicker && autoTimer) { clearInterval(autoTimer); autoTimer = null; }
        }

        const EVENTS = [
            { icon: '🦝', text: 'Вор украл печенье!', sub: (n) => `-${n} 🍪` },
            { icon: '💔', text: 'Печенье рассыпалось!', sub: (n) => `-${n} 🍪` },
            { icon: '🐭', text: 'Мыши пробрались на склад!', sub: (n) => `-${n} 🍪` },
            { icon: '👤', text: 'Кто-то съел твои запасы!', sub: (n) => `-${n} 🍪` },
        ];

        function perClick() { return 1 + clickBonus; }

        function showFloatingText(x, y, text, cls) {
            const el = document.createElement('div');
            el.className = 'plus-one ' + (cls || 'gain');
            el.textContent = text;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function showEventPopup(icon, text, sub) {
            const popup = document.getElementById('event-popup');
            popup.innerHTML = `
                <div class="event-popup">
                    <div class="icon">${icon}</div>
                    <div class="text">${text}</div>
                    <div class="sub">${sub}</div>
                    <button class="btn" onclick="closeEvent()">Ок</button>
                </div>
            `;
            popup.style.display = 'block';
        }

        function closeEvent() {
            document.getElementById('event-popup').style.display = 'none';
        }

        function triggerRandomEvent() {
            const now = Math.floor(Date.now() / 1000);
            if (shieldUntil > now) {
                showEventPopup('🛡️', 'Щит сработал!', 'Злоумышленник не прошёл');
                return;
            }
            const event = EVENTS[Math.floor(Math.random() * EVENTS.length)];
            const loss = Math.max(1, Math.floor(score * (0.05 + Math.random() * 0.15)));
            const actualLoss = Math.min(score, loss);
            if (actualLoss <= 0) return;
            score -= actualLoss;
            renderUI(); scheduleSave();
            showEventPopup(event.icon, event.text, event.sub(actualLoss));
            showFloatingText(window.innerWidth / 2, window.innerHeight / 2, '-' + actualLoss, 'loss');
        }

        function scheduleRandomEvent() {
            if (eventTimer) clearTimeout(eventTimer);
            const delay = 15000 + Math.random() * 35000;
            eventTimer = setTimeout(() => {
                if (score > 50) triggerRandomEvent();
                scheduleRandomEvent();
            }, delay);
        }

        document.querySelectorAll('.tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('page-' + btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'leaderboard') loadLeaderboard();
                if (btn.dataset.tab === 'shop') renderShop();
            });
        });

        function updateShieldDisplay() {
            const el = document.getElementById('shield-indicator');
            const timerEl = document.getElementById('shield-timer');
            const now = Math.floor(Date.now() / 1000);
            if (shieldUntil > now) {
                el.style.display = 'inline-block';
                const rem = shieldUntil - now;
                const m = Math.floor(rem / 60);
                const s = rem % 60;
                timerEl.textContent = m + ':' + String(s).padStart(2, '0');
            } else {
                el.style.display = 'none';
                shieldUntil = 0;
            }
        }

        function renderUI() {
            document.getElementById('username').textContent = userName;
            document.getElementById('score').textContent = score;
            const parts = [`+${perClick()} за клик`];
            if (autoClicker) parts.push('⚡ автокликер');
            document.getElementById('multiplier').textContent = parts.join(' · ');
            updateShieldDisplay();
            renderShop();
        }

        function timeStr(expiry) {
            const rem = Math.max(0, expiry - Math.floor(Date.now() / 1000));
            const m = Math.floor(rem / 60), s = rem % 60;
            return m + ':' + String(s).padStart(2, '0');
        }

        function renderShop() {
            const allUpgrades = [
                { key: 'click_bonus_1', icon: '🖊️', name: 'Лучшая ручка', desc: '+1 к клику', cost: 50 },
                { key: 'click_bonus_3', icon: '🦾', name: 'Механическая рука', desc: '+3 к клику', cost: 200 },
                { key: 'click_bonus_7', icon: '🤖', name: 'Робот-кликер', desc: '+7 к клику', cost: 800 },
                { key: 'auto_clicker', icon: '⚡', name: 'Автокликер', desc: '+1 каждые 2 сек', cost: 300 },
                { key: 'shield', icon: '🛡️', name: 'Щит (5 мин)', desc: 'Защита от случайных событий', cost: 200 },
            ];
            const now = Math.floor(Date.now() / 1000);
            const el = document.getElementById('shop-list');
            el.innerHTML = allUpgrades.map(u => {
                const expiry = activeUpgrades[u.key];
                const isActive = expiry && expiry > now;
                const canBuy = score >= u.cost && !isActive;
                const timeLeft = isActive ? timeStr(expiry) : '';
                return `
                    <div class="shop-item">
                        <div class="shop-icon">${u.icon}</div>
                        <div class="shop-info">
                            <div class="shop-name">${u.name}</div>
                            <div class="shop-desc">${u.desc} · ${u.cost} 🍪${timeLeft ? ' · ⏱ ' + timeLeft : ''}</div>
                        </div>
                        <button class="shop-btn ${isActive ? 'bought' : ''}" data-key="${u.key}" ${!canBuy && !isActive ? 'disabled' : ''}>
                            ${isActive ? '✓' : 'Купить'}
                        </button>
                    </div>
                `;
            }).join('');

            el.querySelectorAll('.shop-btn:not(.bought):not([disabled])').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const res = await fetch('/api/upgrade/buy', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                        body: JSON.stringify({ upgrade: btn.dataset.key }),
                    });
                    const data = await res.json();
                    if (data.ok) {
                        score = data.score;
                        activeUpgrades = data.active_upgrades || {};
                        recalcDerived();
                        if (autoClicker) startAutoClicker();
                        renderUI(); scheduleSave();
                    } else {
                        document.getElementById('status').textContent = data.error;
                    }
                });
            });
        }

        function startAutoClicker() {
            if (autoTimer) clearInterval(autoTimer);
            autoTimer = setInterval(() => {
                if (!autoClicker) { clearInterval(autoTimer); autoTimer = null; return; }
                score++;
                renderUI(); scheduleSave();
            }, 2000);
        }

        function scheduleSave() {
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(saveToServer, 500);
        }

        async function saveToServer() {
            try {
                await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                    body: JSON.stringify({ user_name: userName, score }),
                });
                document.getElementById('status').textContent = '✓ Сохранено';
            } catch { document.getElementById('status').textContent = '✗ Ошибка'; }
        }

        function showNotificationPopup(icon, text) {
            const popup = document.getElementById('event-popup');
            popup.innerHTML = `
                <div class="event-popup">
                    <div class="icon">${icon}</div>
                    <div class="text">${text}</div>
                    <button class="btn" onclick="closeEvent()">Ок</button>
                </div>
            `;
            popup.style.display = 'block';
        }

        async function loadUser() {
            try {
                const res = await fetch('/api/user', { headers: { 'x-telegram-user-id': userId } });
                const d = await res.json();
                score = d.score || 0;
                activeUpgrades = d.active_upgrades || {};
                recalcDerived();
                if (autoClicker) startAutoClicker();
                renderUI();
                scheduleRandomEvent();
                setInterval(updateShieldDisplay, 1000);
                recalcTimer = setInterval(() => { recalcDerived(); renderUI(); }, 1000);
                const notifs = d.notifications || [];
                if (notifs.length > 0) {
                    const n = notifs[0];
                    showNotificationPopup(n.icon, n.text);
                }
            } catch { renderUI(); scheduleRandomEvent(); }
        }

        function showLbMsg(text, isError) {
            const el = document.getElementById('lb-msg');
            el.textContent = text;
            el.style.display = 'block';
            el.style.background = isError ? '#f4433622' : '#4caf5022';
            el.style.color = isError ? '#f44336' : '#4caf50';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const d = await res.json();
                const list = document.getElementById('lb-list');
                if (!d.leaderboard || d.leaderboard.length === 0) {
                    list.innerHTML = '<div class="lb-empty">Пока нет участников</div>';
                    return;
                }
                list.innerHTML = d.leaderboard.map((e, i) => {
                    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                    const isSelf = e.user_id === userId;
                    return `
                        <div class="lb-entry">
                            <div class="lb-rank ${rankClass}">${i + 1}</div>
                            <div class="lb-name">${e.name} ${isSelf ? '(ты)' : ''}</div>
                            <div class="lb-score">${e.score}</div>
                            ${!isSelf ? `<button class="lb-attack" data-target="${e.user_id}" data-name="${e.name}">💢 Атака (500🍪)</button>` : ''}
                        </div>
                    `;
                }).join('');

                list.querySelectorAll('.lb-attack').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        btn.disabled = true; btn.textContent = '...';
                        const res = await fetch('/api/attack', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'x-telegram-user-id': userId },
                            body: JSON.stringify({ target_id: btn.dataset.target }),
                        });
                        const d = await res.json();
                        if (d.ok) {
                            score = d.new_score;
                            renderUI(); scheduleSave();
                            loadLeaderboard();
                            showLbMsg(`💢 Атака на ${btn.dataset.name} успешна! Украдено ${d.stolen} 🍪 (${d.pct}%), но ${d.broken} 🍪 (${d.break_pct}%) разбилось. Получено: ${d.gained} 🍪. Твой счёт: ${d.new_score}`, false);
                        } else {
                            showLbMsg(d.error, true);
                            btn.disabled = false; btn.textContent = '💢 Атака (500🍪)';
                        }
                    });
                });
            } catch {
                document.getElementById('lb-list').innerHTML = '<div class="lb-empty">Ошибка загрузки</div>';
            }
        }

        document.getElementById('cookie').addEventListener('click', (e) => {
            const gain = perClick();
            score += gain;
            renderUI(); scheduleSave();
            showFloatingText(e.clientX - 16, e.clientY - 16, '+' + gain, 'gain');
        });

        loadUser();
    </script>
</body>
</html>
