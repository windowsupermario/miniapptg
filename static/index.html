<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
        }
        .container { text-align: center; max-width: 400px; width: 100%; }
        h1 { font-size: 22px; margin-bottom: 4px; }
        .username { color: var(--tg-theme-hint-color, #888); margin-bottom: 16px; font-size: 14px; }
        .score-wrap { margin-bottom: 20px; }
        .score-label { font-size: 13px; color: var(--tg-theme-hint-color, #888); text-transform: uppercase; letter-spacing: 1px; }
        .score { font-size: 48px; font-weight: 800; line-height: 1.1; }
        .cookie {
            width: 200px; height: 200px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #f5d68a, #c8943c);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            box-shadow:
                0 8px 24px rgba(0,0,0,0.15),
                inset 0 -4px 8px rgba(0,0,0,0.1),
                inset 0 4px 8px rgba(255,255,255,0.3);
            transition: transform 0.1s;
            position: relative;
        }
        .cookie:active { transform: scale(0.92); }
        .cookie-chips {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            pointer-events: none;
        }
        .chip {
            position: absolute;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #6b4226;
            opacity: 0.6;
        }
        .chip:nth-child(1) { top: 25%; left: 30%; }
        .chip:nth-child(2) { top: 45%; left: 60%; }
        .chip:nth-child(3) { top: 65%; left: 35%; }
        .chip:nth-child(4) { top: 35%; left: 65%; }
        .chip:nth-child(5) { top: 55%; left: 25%; }
        .chip:nth-child(6) { top: 70%; left: 55%; }

        .plus-one {
            position: fixed;
            font-size: 32px;
            font-weight: 800;
            color: #4caf50;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }
        .status { margin-top: 4px; font-size: 12px; color: var(--tg-theme-hint-color, #aaa); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍪 Cookie Clicker</h1>
        <p class="username" id="username">Загрузка...</p>

        <div class="score-wrap">
            <div class="score-label">Очки</div>
            <div class="score" id="score">0</div>
        </div>

        <div class="cookie" id="cookie">
            <div class="cookie-chips">
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
                <div class="chip"></div>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const userId = tg?.initDataUnsafe?.user?.id?.toString() || 'guest';
        const userName = tg?.initDataUnsafe?.user?.first_name || 'Гость';
        let score = 0;
        let savedScore = 0;
        let saveTimer = null;

        document.getElementById('username').textContent = userName;

        function showPlusOne(x, y) {
            const el = document.createElement('div');
            el.className = 'plus-one';
            el.textContent = '+1';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            saveTimer = null;
            scheduleSave();
        }

        function scheduleSave() {
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(saveScoreToServer, 500);
        }

        async function saveScoreToServer() {
            try {
                await fetch('/api/score', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-telegram-user-id': userId,
                    },
                    body: JSON.stringify({ score }),
                });
                document.getElementById('status').textContent = savedScore !== score ? 'Сохранено' : '';
                savedScore = score;
            } catch {
                document.getElementById('status').textContent = 'Ошибка сохранения';
            }
        }

        async function loadScore() {
            try {
                const res = await fetch('/api/score', {
                    headers: { 'x-telegram-user-id': userId },
                });
                const data = await res.json();
                score = data.score || 0;
                savedScore = score;
                updateScore();
            } catch {
                score = 0;
                updateScore();
            }
        }

        document.getElementById('cookie').addEventListener('click', async (e) => {
            score++;
            updateScore();
            showPlusOne(e.clientX - 16, e.clientY - 16);
        });

        loadScore();
    </script>
</body>
</html>
